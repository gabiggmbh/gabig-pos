<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gäbig POS · Slides</title>
  <link rel="stylesheet" href="pos-styles.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    .slides-host { display: flex; flex-direction: column; align-items: flex-start; }
    .slide-frame {
      width: 1440px; height: 900px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
  </style>
  <script>window.__POS_NO_AUTO_RENDER = true;</script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
    const {
      ShiftOpenScreen, SaleEmptyScreen, SaleActiveScreen,
      CustomerPickerScreen, PaymentSelectScreen, CardPaymentScreen,
      TwintScreen, CashScreen, ReceiptScreen, ShiftCloseScreen,
    } = window;

    const order = [
      ShiftOpenScreen, SaleEmptyScreen, SaleActiveScreen,
      CustomerPickerScreen, PaymentSelectScreen, CardPaymentScreen,
      TwintScreen, CashScreen, ReceiptScreen, ShiftCloseScreen,
    ];

    const SlidesApp = () => (
      <div className="slides-host">
        {order.map((Screen, i) => (
          <div className="slide-frame" data-slide={i + 1} key={i}>
            <Screen/>
          </div>
        ))}
      </div>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<SlidesApp/>);
  </script>
</body>
</html>
