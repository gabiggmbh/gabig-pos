<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gäbig POS · Desktop · Print</title>
  <link rel="stylesheet" href="pos-styles.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }

    /* ====================== PRINT ====================== */
    @media print {
      /* page itself: same aspect as the artboard, no margins */
      @page { size: 1440px 900px; margin: 0; }

      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        animation: none !important;
        transition: none !important;
      }

      html, body { background: #fff !important; width: 1440px !important; }

      /* kill canvas chrome */
      .dc-header, .dc-sectionhead, .dc-grip, .dc-btns, .dc-menu,
      .dc-labelrow, .dc-labeltext, .dc-expand, .dc-kebab { display: none !important; }

      /* viewport: drop its 100vw/100vh + scroll lock and let content flow */
      .design-canvas {
        position: static !important;
        width: 1440px !important;
        height: auto !important;
        overflow: visible !important;
        background: #fff !important;
        cursor: default !important;
        contain: none !important;
      }
      /* hide the grid svg background */
      .design-canvas { background-image: none !important; }

      /* world: clear the inline translate/scale transform set by JS */
      .design-canvas > div {
        transform: none !important;
        position: static !important;
        width: 1440px !important;
        min-width: 0 !important;
        height: auto !important;
        min-height: 0 !important;
        --dc-inv-zoom: 1 !important;
      }

      /* sections: stack, no margin between */
      [data-dc-section] {
        margin: 0 !important;
        padding: 0 !important;
        position: static !important;
        width: 1440px !important;
      }
      [data-dc-section] > div { padding: 0 !important; width: 1440px !important; }
      [data-dc-section] > div > div {
        display: block !important;
        gap: 0 !important;
        padding: 0 !important;
        width: 1440px !important;
      }

      /* each artboard slot: one page */
      [data-dc-slot] {
        position: static !important;
        transform: none !important;
        margin: 0 !important;
        padding: 0 !important;
        display: block !important;
        width: 1440px !important;
        height: 900px !important;
        break-after: page !important;
        page-break-after: always !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }
      [data-dc-slot]:last-child {
        break-after: auto !important;
        page-break-after: auto !important;
      }

      /* the card itself: flush, no border/shadow/radius */
      .dc-card {
        width: 1440px !important;
        height: 900px !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        overflow: hidden !important;
      }

      /* belt-and-braces — pos screen itself shouldn't break */
      .pos-screen { break-inside: avoid !important; page-break-inside: avoid !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
    // wait for fonts + Babel-transformed scripts (render kicks off there),
    // then trigger print
    (async () => {
      try { await document.fonts.ready; } catch (e) {}
      // wait until the canvas world has rendered at least one section
      let tries = 0;
      while (tries < 40 && !document.querySelector('[data-dc-section]')) {
        await new Promise(r => setTimeout(r, 100));
        tries++;
      }
      // extra settle for layout
      setTimeout(() => window.print(), 600);
    })();
  </script>
</body>
</html>
